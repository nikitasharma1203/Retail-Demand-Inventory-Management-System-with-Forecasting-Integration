<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="680" fill="#f9f6f0" rx="12"/>
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c2c2c">
    Retail Store Sales Forecasting — ER Diagram
  </text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#888">DS-604 | THE INSIGHT EXPRESS</text>

  <!-- ══════════ STORE ══════════ -->
  <rect x="30" y="80" width="180" height="210" rx="6" fill="#ddeeff" stroke="#4477aa" stroke-width="1.5"/>
  <rect x="30" y="80" width="180" height="28" rx="6" fill="#4477aa"/>
  <text x="120" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="white">store</text>
  <text x="42" y="124" font-size="11" fill="#222">🔑 store_id      INTEGER PK</text>
  <text x="42" y="142" font-size="11" fill="#222">   store_type   CHAR(1)</text>
  <text x="42" y="160" font-size="11" fill="#222">   store_size   INTEGER</text>
  <text x="42" y="178" font-size="11" fill="#222">   region       VARCHAR(50)</text>
  <line x1="36" y1="188" x2="204" y2="188" stroke="#4477aa" stroke-width="0.7" stroke-dasharray="3,3"/>
  <text x="42" y="204" font-size="10" fill="#555">CHECK store_type IN (A,B,C)</text>
  <text x="42" y="220" font-size="10" fill="#555">CHECK store_size &gt; 0</text>

  <!-- ══════════ DEPARTMENT ══════════ -->
  <rect x="390" y="80" width="185" height="160" rx="6" fill="#ddeeff" stroke="#4477aa" stroke-width="1.5"/>
  <rect x="390" y="80" width="185" height="28" rx="6" fill="#4477aa"/>
  <text x="482" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="white">department</text>
  <text x="402" y="124" font-size="11" fill="#222">🔑 dept_id      INTEGER PK</text>
  <text x="402" y="142" font-size="11" fill="#222">   dept_name    VARCHAR(100)</text>
  <text x="402" y="160" font-size="11" fill="#222">   category     VARCHAR(50)</text>

  <!-- ══════════ HOLIDAY ══════════ -->
  <rect x="740" y="80" width="195" height="185" rx="6" fill="#fff0dd" stroke="#cc7700" stroke-width="1.5"/>
  <rect x="740" y="80" width="195" height="28" rx="6" fill="#cc7700"/>
  <text x="837" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="white">holiday</text>
  <text x="752" y="124" font-size="11" fill="#222">🔑 holiday_id   SERIAL PK</text>
  <text x="752" y="142" font-size="11" fill="#222">   holiday_name VARCHAR(100)</text>
  <text x="752" y="160" font-size="11" fill="#222">   holiday_date DATE</text>
  <text x="752" y="178" font-size="11" fill="#222">   season       VARCHAR(20)</text>
  <text x="752" y="196" font-size="11" fill="#222">   is_super     BOOLEAN</text>
  <line x1="748" y1="206" x2="928" y2="206" stroke="#cc7700" stroke-width="0.7" stroke-dasharray="3,3"/>
  <text x="752" y="220" font-size="10" fill="#555">CHECK season IN (Spring…Winter)</text>

  <!-- ══════════ SALES ══════════ -->
  <rect x="30" y="360" width="200" height="220" rx="6" fill="#eeffee" stroke="#227733" stroke-width="1.5"/>
  <rect x="30" y="360" width="200" height="28" rx="6" fill="#227733"/>
  <text x="130" y="379" text-anchor="middle" font-size="13" font-weight="bold" fill="white">sales</text>
  <text x="42" y="403" font-size="11" fill="#222">🔑 sales_id     SERIAL PK</text>
  <text x="42" y="421" font-size="11" fill="#222">🔗 store_id     INTEGER FK</text>
  <text x="42" y="439" font-size="11" fill="#222">🔗 dept_id      INTEGER FK</text>
  <text x="42" y="457" font-size="11" fill="#222">   sale_date    DATE</text>
  <text x="42" y="475" font-size="11" fill="#222">   weekly_sales DECIMAL(12,2)</text>
  <text x="42" y="493" font-size="11" fill="#222">   is_holiday   BOOLEAN</text>
  <line x1="36" y1="503" x2="224" y2="503" stroke="#227733" stroke-width="0.7" stroke-dasharray="3,3"/>
  <text x="42" y="520" font-size="10" fill="#555">CHECK weekly_sales ≥ 0</text>
  <text x="42" y="535" font-size="10" fill="#555">IDX: store_id, dept_id, date</text>

  <!-- ══════════ FEATURES ══════════ -->
  <rect x="360" y="300" width="230" height="320" rx="6" fill="#fff8dd" stroke="#996600" stroke-width="1.5"/>
  <rect x="360" y="300" width="230" height="28" rx="6" fill="#996600"/>
  <text x="475" y="319" text-anchor="middle" font-size="13" font-weight="bold" fill="white">features</text>
  <text x="372" y="343" font-size="11" fill="#222">🔑 feature_id   SERIAL PK</text>
  <text x="372" y="361" font-size="11" fill="#222">🔗 store_id     INTEGER FK</text>
  <text x="372" y="379" font-size="11" fill="#222">🔗 holiday_id   INTEGER FK</text>
  <text x="372" y="397" font-size="11" fill="#222">   feature_date DATE</text>
  <text x="372" y="415" font-size="11" fill="#222">   temperature  DECIMAL(6,2)</text>
  <text x="372" y="433" font-size="11" fill="#222">   fuel_price   DECIMAL(6,3)</text>
  <text x="372" y="451" font-size="11" fill="#222">   markdown_1   DECIMAL(10,2)</text>
  <text x="372" y="469" font-size="11" fill="#222">   markdown_2   DECIMAL(10,2)</text>
  <text x="372" y="487" font-size="11" fill="#222">   markdown_3   DECIMAL(10,2)</text>
  <text x="372" y="505" font-size="11" fill="#222">   markdown_4   DECIMAL(10,2)</text>
  <text x="372" y="523" font-size="11" fill="#222">   markdown_5   DECIMAL(10,2)</text>
  <text x="372" y="541" font-size="11" fill="#222">   cpi          DECIMAL(10,4)</text>
  <text x="372" y="559" font-size="11" fill="#222">   unemployment DECIMAL(6,3)</text>
  <text x="372" y="577" font-size="11" fill="#222">   is_holiday   BOOLEAN</text>
  <line x1="366" y1="585" x2="584" y2="585" stroke="#996600" stroke-width="0.7" stroke-dasharray="3,3"/>
  <text x="372" y="600" font-size="10" fill="#555">UNIQUE(store_id, feature_date)</text>

  <!-- ══════════ TRIGGER / PROCEDURE BOXES ══════════ -->
  <rect x="680" y="300" width="250" height="150" rx="6" fill="#f0e8ff" stroke="#774499" stroke-width="1.4" stroke-dasharray="6,3"/>
  <text x="805" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#774499">⚡ Triggers</text>
  <text x="692" y="340" font-size="10" fill="#444">trg_sales_spike       → spike log</text>
  <text x="692" y="356" font-size="10" fill="#444">trg_markdown_anomaly  → anomaly log</text>
  <text x="692" y="372" font-size="10" fill="#444">trg_guard_neg_sales   → BEFORE INSERT</text>

  <rect x="680" y="470" width="250" height="130" rx="6" fill="#e8fff0" stroke="#337744" stroke-width="1.4" stroke-dasharray="6,3"/>
  <text x="805" y="490" text-anchor="middle" font-size="12" font-weight="bold" fill="#337744">📋 Procedures / Views</text>
  <text x="692" y="510" font-size="10" fill="#444">sp_monthly_demand_report(y,m)</text>
  <text x="692" y="526" font-size="10" fill="#444">sp_holiday_uplift()</text>
  <text x="692" y="542" font-size="10" fill="#444">sp_insert_sales_with_features()</text>
  <text x="692" y="558" font-size="10" fill="#444">vw_holiday_sales_uplift</text>
  <text x="692" y="574" font-size="10" fill="#444">vw_markdown_effectiveness</text>
  <text x="692" y="590" font-size="10" fill="#444">vw_top_departments_by_revenue</text>

  <!-- ══════════ RELATIONSHIP LINES ══════════ -->
  <!-- store → sales (1:N) -->
  <line x1="130" y1="290" x2="130" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="136" y="330" font-size="10" fill="#555">1:N</text>

  <!-- store → features (1:N) -->
  <line x1="210" y1="170" x2="360" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="265" y="280" font-size="10" fill="#555">1:N</text>

  <!-- department → sales (1:N) -->
  <line x1="482" y1="240" x2="230" y2="420" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="385" y="350" font-size="10" fill="#555">1:N</text>

  <!-- holiday → features (1:N) -->
  <line x1="740" y1="170" x2="590" y2="370" stroke="#cc7700" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="668" y="280" font-size="10" fill="#cc7700">1:N</text>

  <!-- Legend -->
  <rect x="30" y="618" width="600" height="48" rx="5" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="44" y="636" font-size="11" font-weight="bold" fill="#333">Legend:</text>
  <rect x="100" y="625" width="12" height="12" fill="#ddeeff" stroke="#4477aa"/>
  <text x="118" y="636" font-size="10" fill="#333">Dimension table</text>
  <rect x="230" y="625" width="12" height="12" fill="#eeffee" stroke="#227733"/>
  <text x="248" y="636" font-size="10" fill="#333">Fact table</text>
  <rect x="330" y="625" width="12" height="12" fill="#fff8dd" stroke="#996600"/>
  <text x="348" y="636" font-size="10" fill="#333">Feature/time-series table</text>
  <text x="44" y="656" font-size="10" fill="#555">🔑 = Primary Key   🔗 = Foreign Key   ⚡ = Trigger   IDX = Index</text>
</svg>
